name: Android Release Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      push_to_artifacts_branch:
        description: "Also push built APK to artifacts branch"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "17"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "27.2.12479018"
      ANDROID_CMAKE_VERSION: "3.22.1"
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK/NDK components
        shell: bash
        run: |
          set -euxo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"


      - name: Setup Go
        if: ${{ github.event_name != 'pull_request' || vars.FORCE_GOMOBILE == 'true' }}
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc-src/go.sum

      - name: Checkout olcrtc source
        if: ${{ github.event_name != 'pull_request' || vars.FORCE_GOMOBILE == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          path: olcrtc-src
          submodules: recursive

      - name: Install gomobile
        if: ${{ github.event_name != 'pull_request' || vars.FORCE_GOMOBILE == 'true' }}
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: |
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build olcrtc AAR from source
        if: ${{ github.event_name != 'pull_request' || vars.FORCE_GOMOBILE == 'true' }}
        shell: bash
        env:
          OLCRTC_REPO: ${{ github.workspace }}/olcrtc-src
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: |
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          cd "${OLCRTC_REPO}"
          gomobile bind -target=android -androidapi 21 -ldflags "-s -w -checklinkname=0" -o /tmp/olcrtc.aar ./mobile 2>&1
          echo "AAR size: $(ls -lh /tmp/olcrtc.aar | awk '{print $5}')"

      - name: Use gomobile-built AAR
        if: ${{ github.event_name != 'pull_request' || vars.FORCE_GOMOBILE == 'true' }}
        shell: bash
        run: |
          # Extract classes.jar and libgojni.so from the freshly built AAR
          cd /tmp && rm -rf aar-extract && mkdir aar-extract && cd aar-extract
          unzip -o /tmp/olcrtc.aar 2>&1 | tail -3
          # Copy to the project
          cp classes.jar ${{ github.workspace }}/olcrtc/src/main/libs/olcrtc-classes.jar
          # Copy libgojni.so for all available ABIs
          for abi in arm64-v8a x86_64; do
            if [ -f "jni/$abi/libgojni.so" ]; then
              cp "jni/$abi/libgojni.so" "${{ github.workspace }}/olcrtc/src/main/jniLibs/$abi/libgojni.so"
              echo "Copied jni/$abi/libgojni.so"
            fi
          done
          echo "Updated AAR artifacts from gomobile build"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Compute CI version metadata
        shell: bash
        run: |
          set -euxo pipefail
          BASE_VERSION="1.0"
          BUILD_DATE="$(date +%Y%m%d)"
          CI_VERSION_NAME="${BASE_VERSION}.${BUILD_DATE}.${GITHUB_RUN_NUMBER}"
          CI_VERSION_CODE=$((200000 + GITHUB_RUN_NUMBER))
          echo "CI_VERSION_NAME=${CI_VERSION_NAME}" >> "$GITHUB_ENV"
          echo "CI_VERSION_CODE=${CI_VERSION_CODE}" >> "$GITHUB_ENV"
          echo "Building version: ${CI_VERSION_NAME} (${CI_VERSION_CODE})"

      - name: Decode keystore and set signing env vars
        id: keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          echo "ANDROID_KEYSTORE_PATH=${PWD}/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release APK (signed via Gradle when keystore available)
        shell: bash
        run: |
          set -euxo pipefail
          ./gradlew --no-daemon :ui:assembleRelease \
            -PwireguardVersionCode="${CI_VERSION_CODE}" \
            -PwireguardVersionName="${CI_VERSION_NAME}"

      - name: Locate generated APK (signed or not)
        id: apk
        shell: bash
        run: |
          set -euxo pipefail
          apk="$(find ui/build/outputs/apk/release -type f -name '*-release.apk' ! -name '*-release-unsigned.apk' | head -n 1)"
          if [ -z "${apk}" ]; then
            # fallback to unsigned if no signed found (e.g. no keystore configured)
            apk="$(find ui/build/outputs/apk/release -type f -name '*-release-unsigned.apk' | head -n 1)"
          fi
          if [ -z "${apk}" ]; then
            echo "No release APK found" >&2
            exit 1
          fi
          echo "final_apk=${apk}" >> "$GITHUB_OUTPUT"
          echo "APK: ${apk}"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wireguard-android-apk
          path: ${{ steps.apk.outputs.final_apk }}
          if-no-files-found: error

      - name: Optionally push APK to artifacts branch
        if: ${{ github.event_name != 'pull_request' && ((github.event_name == 'workflow_dispatch' && inputs.push_to_artifacts_branch) || vars.PUSH_ARTIFACTS_BRANCH == 'true') }}
        shell: bash
        env:
          FINAL_APK: ${{ steps.apk.outputs.final_apk }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin artifacts || true
          if git show-ref --verify --quiet refs/remotes/origin/artifacts; then
            git switch --create artifacts --track origin/artifacts
          else
            git switch --orphan artifacts
            git rm -rf . || true
          fi

          out_dir="apks/${GITHUB_REF_NAME}"
          mkdir -p "$out_dir"
          cp "$FINAL_APK" "$out_dir/"

          git add "$out_dir"
          if ! git diff --cached --quiet; then
            git commit -m "Add APK for ${GITHUB_REF_NAME}"
            git push origin artifacts
          else
            echo "No changes to push to artifacts branch"
          fi

      - name: Create GitHub Release and upload APK (tags only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.final_apk }}
